# ANDEX GATEWAY - Docker Compose Produccion
# Sin Orthanc. Para hospitales con su propio PACS.
# Usa network_mode: host para acceso directo a red local.
#
# Uso: docker-compose -f docker-compose.prod.yml up -d

services:
  gateway:
    build: .
    image: andex-gateway:latest
    container_name: andex-gateway
    network_mode: host
    env_file:
      - .env
    environment:
      - STORAGE_PATH=/app/data
    volumes:
      - gateway-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  gateway-data:
    driver: local
