# ANDEX GATEWAY - Docker Compose Produccion
# Sin Orthanc. Para hospitales con su propio PACS.
# Identico al gateway del docker-compose.yml original.
#
# Uso: docker-compose -f docker-compose.prod.yml up -d

services:
  gateway:
    image: ghcr.io/agallardov-ai/andex-gateway:latest
    build: .
    container_name: andex-gateway
    ports:
      - "${HTTP_PORT:-3001}:3001"
      - "${HTTPS_PORT:-3443}:3443"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - STORAGE_PATH=/app/data
      - HTTPS_PORT=3443
    volumes:
      - gateway-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.prod.yml:/app/docker-compose.prod.yml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  gateway-data:
    driver: local
