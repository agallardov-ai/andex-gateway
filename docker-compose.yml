version: '3.8'

services:
  gateway:
    build: .
    container_name: andex-gateway
    ports:
      - "3001:3001"
    environment:
      # Identidad del centro
      - CENTRO_NOMBRE=${CENTRO_NOMBRE:-Hospital Naval Talcahuano}
      - CENTRO_ID=${CENTRO_ID:-HOSPTALC}
      
      # Gateway
      - PORT=3001
      - NODE_ENV=production
      
      # Seguridad
      - API_KEY=${API_KEY:-cambiar-api-key}
      - DASHBOARD_USER=${DASHBOARD_USER:-admin}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-admin123}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://andexreports.app,http://localhost:5173}
      
      # PACS (usa Orthanc del compose por defecto)
      - PACS_TYPE=${PACS_TYPE:-orthanc}
      - PACS_BASE_URL=${PACS_BASE_URL:-http://orthanc:8042}
      
      # DICOMweb endpoints
      - PACS_STOW_ENDPOINT=${PACS_STOW_ENDPOINT:-/dicomweb/studies}
      - PACS_QIDO_ENDPOINT=${PACS_QIDO_ENDPOINT:-/dicomweb/studies}
      - PACS_WADO_ENDPOINT=${PACS_WADO_ENDPOINT:-/dicomweb/studies}
      
      # Worklist endpoints
      - WORKLIST_ENDPOINT=${WORKLIST_ENDPOINT:-/dicomweb/workitems}
      - WORKLIST_MWL_ENDPOINT=${WORKLIST_MWL_ENDPOINT:-/dicomweb/mwlitems}
      - WORKLIST_PREFER_UPS=${WORKLIST_PREFER_UPS:-false}
      - WORKLIST_DEFAULT_MODALITY=${WORKLIST_DEFAULT_MODALITY:-ES}
      
      # Autenticación PACS
      - PACS_AUTH_TYPE=${PACS_AUTH_TYPE:-none}
      - PACS_USERNAME=${PACS_USERNAME:-}
      - PACS_PASSWORD=${PACS_PASSWORD:-}
      
      # Storage
      - STORAGE_PATH=/app/data
      
      # Queue
      - QUEUE_RETRY_INTERVAL=${QUEUE_RETRY_INTERVAL:-5000}
      - QUEUE_MAX_RETRIES=${QUEUE_MAX_RETRIES:-5}
      - CLEANUP_AFTER_HOURS=${CLEANUP_AFTER_HOURS:-48}
    volumes:
      - gateway-data:/app/data
    depends_on:
      orthanc:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - andex-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  orthanc:
    image: orthancteam/orthanc:latest
    container_name: andex-orthanc
    ports:
      - "8042:8042"
      - "4242:4242"
    environment:
      - ORTHANC__NAME=AndexOrthanc
      - ORTHANC__REMOTE_ACCESS_ALLOWED=true
      - ORTHANC__AUTHENTICATION_ENABLED=false
      - DICOM_WEB_PLUGIN_ENABLED=true
      - VERBOSE_ENABLED=true
    volumes:
      - orthanc-data:/var/lib/orthanc/db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8042/system"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - andex-network

volumes:
  gateway-data:
  orthanc-data:

networks:
  andex-network:
    driver: bridge
